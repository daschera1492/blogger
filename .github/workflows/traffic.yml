name: Generate Traffic

on:
  schedule:
    # این دستور هر 4 ساعت یکبار اجرا می‌شود
    - cron: '0 */1 * * *'
  workflow_dispatch: # امکان اجرای دستی برای تست

jobs:
  visit-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Random Delay and Visit
        run: |
          # ایجاد یک تاخیر تصادفی بین 1 تا 60 دقیقه برای اینکه رفتار ربات‌گونه نباشد
          RANDOM_DELAY=$((1 + RANDOM % 60))
          echo "Waiting for $RANDOM_DELAY minutes before visiting..."
          sleep $((RANDOM_DELAY * 60))

          # لیست آدرس‌های خود را اینجا وارد کنید (بین هر آدرس یک فاصله بگذارید)
          URLS=("https://blogger-weld.vercel.app" "https://your-site-2.vercel.app")

          for url in "${URLS[@]}"; do
            echo "Visiting $url ..."
            # استفاده از curl با User-Agent واقعی برای شبیه‌سازی مرورگر
            curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -s -L $url > /dev/null
            echo "Done."
          done
