name: Random Web Visitor

on:
  schedule:
    # تنظیم شده برای هر ۲ ساعت (۱۲ بار در روز)
    # اما با شرط داخلی، فقط حدود ۵۰٪ دفعات اجرا می‌شود تا به هدف ۴-۷ بار برسیم
    - cron: '0 */2 * * *' 
  workflow_dispatch: # امکان اجرای دستی برای تست

jobs:
  browse:
    runs-on: ubuntu-latest
    steps:
      - name: Check Random Chance and Delay
        run: |
          # تولید عدد تصادفی بین ۱ تا ۱۰۰
          CHANCE=$(( ( RANDOM % 100 )  + 1 ))
          
          # فقط اگر عدد زیر ۵۰ بود ادامه بده (تقریباً ۶ بار در روز از ۱۲ بار)
          if [ $CHANCE -gt 50 ]; then
            echo "Skipping this run to stay random."
            exit 0
          fi
          
          # تاخیر تصادفی بین ۱ تا ۶۰ دقیقه قبل از شروع اصلی برای طبیعی شدن ساعت
          DELAY=$(( ( RANDOM % 60 )  + 1 ))
          echo "Waiting for $DELAY minutes before starting..."
          sleep $(( DELAY * 60 ))

      - name: Random Website Browsing
        run: |
          # لیست سایت‌ها
          URLS=("https://maser-eight.vercel.app/" "https://molania.vercel.app/")
          
          # بهم ریختن ترتیب لیست (Shuffle)
          SHUFFLED_URLS=$(shuf -e "${URLS[@]}")
          
          for URL in $SHUFFLED_URLS; do
            echo "Visiting: $URL"
            
            # استفاده از curl برای شبیه‌سازی بازدید (میتوانید از گزینه‌های User-Agent استفاده کنید)
            curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" $URL > /dev/null
            
            # ماندن در سایت بین ۶۰ تا ۱۸۰ ثانیه (۱ الی ۳ دقیقه)
            STAY_TIME=$(( ( RANDOM % 121 )  + 60 ))
            echo "Staying for $STAY_TIME seconds..."
            sleep $STAY_TIME
          done
